version: 2

models:
  - name: int_trips
    description: "Intermediate trips model with raw trip attributes"
    columns:
      - name: trip_id
        description: "Unique identifier for each trip"
      - name: driver_id
        description: "Driver associated with the trip"
      - name: rider_id
        description: "Rider associated with the trip"
      - name: city_id
        description: "City where the trip occurred"
      - name: requested_at
        description: "Timestamp when trip was requested"
      - name: status
        description: "Trip status (completed, cancelled, etc.)"
      - name: extreme_surge_flag
        description: "Flag indicating surge multiplier exceeded threshold"

  - name: int_payments
    description: "Intermediate payments model with payment outcomes and revenue"
    columns:
      - name: trip_id
        description: "Trip identifier linked to payment"
      - name: net_revenue
        description: "Revenue after fees from successful payments"
      - name: successful_payments
        description: "Count of successful payments for the trip"
      - name: failed_payments
        description: "Count of failed payments for the trip"
      - name: duplicate_payment_flag
        description: "Flag indicating multiple payments recorded for a trip"

  - name: int_trips_enriched
    description: "Trips enriched with payment metrics and fraud indicators"
    columns:
      - name: trip_id
        description: "Unique identifier for each trip"
      - name: driver_id
        description: "Driver associated with the trip"
      - name: rider_id
        description: "Rider associated with the trip"
      - name: city_id
        description: "City where the trip occurred"
      - name: status
        description: "Trip status (completed, cancelled, etc.)"
      - name: net_revenue
        description: "Revenue after fees from successful payments"
      - name: successful_payments
        description: "Count of successful payments"
      - name: failed_payments
        description: "Count of failed payments"
      - name: duplicate_payment_flag
        description: "Flag indicating duplicate payments"
      - name: failed_payment_on_completed_trip
        description: "Flag indicating completed trip with no successful payment"
      - name: extreme_surge_flag
        description: "Flag indicating surge multiplier exceeded threshold"

  - name: int_driver_metrics
    description: "Aggregated driver metrics including trips and revenue"
    columns:
      - name: driver_id
        description: "Unique identifier for driver"
      - name: driver_lifetime_trips
        description: "Total number of completed trips by driver"
      - name: avg_trip_value
        description: "Average fare value per trip"
      - name: gross_revenue
        description: "Total gross revenue from fares"
      - name: net_revenue
        description: "Total net revenue after fees"
      - name: first_trip_at
        description: "Timestamp of driver’s first trip"
      - name: last_trip_at
        description: "Timestamp of driver’s most recent trip"

  - name: int_riders_metrics
    description: "Aggregated rider metrics including lifetime value and activity"
    columns:
      - name: rider_id
        description: "Unique identifier for rider"
      - name: rider_lifetime_value
        description: "Total fare value across completed trips"
      - name: rider_total_trips
        description: "Total number of completed trips by rider"
      - name: count_cities_visited
        description: "Number of distinct cities visited by rider"
      - name: last_ride_date
        description: "Timestamp of rider’s most recent trip"
