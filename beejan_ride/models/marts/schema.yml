version: 2

models:
  - name: facts_trips
    description: "Central fact table at trip grain, combining operational, financial, and fraud indicators"
    config:
        meta:
            owner: analytics_team
            tags: ["operations", "finance", "fraud"]
    columns:
      - name: trip_id
        description: "Unique identifier for each trip"
      - name: city_id
        description: "City where the trip occurred"
      - name: driver_id
        description: "Driver associated with the trip"
      - name: rider_id
        description: "Rider associated with the trip"
      - name: vehicle_id
        description: "Vehicle used for the trip"
      - name: pickup_at
        description: "Timestamp when trip started"
      - name: dropoff_at
        description: "Timestamp when trip ended"
      - name: requested_at
        description: "Timestamp when trip was requested"
      - name: status
        description: "Trip status (completed, cancelled, etc.)"
      - name: payment_method
        description: "Payment method used for the trip"
      - name: corporate_trip_flag
        description: "Flag indicating if trip was corporate-sponsored"
      - name: trip_duration_minutes
        description: "Duration of the trip in minutes"
      - name: actual_fare
        description: "Gross fare charged for the trip"
      - name: net_revenue
        description: "Revenue after fees from successful payments"
      - name: successful_payments
        description: "Count of successful payments"
      - name: failed_payments
        description: "Count of failed payments"
      - name: duplicate_payment_flag
        description: "Flag indicating duplicate payments recorded"
      - name: failed_payment_on_completed_trip
        description: "Flag indicating completed trip with no successful payment"
      - name: extreme_surge_flag
        description: "Flag indicating surge multiplier exceeded threshold"

  - name: dim_drivers
    description: "Driver dimension table with attributes and lifetime metrics"
    config:
        meta:
            owner: driver_ops_team
            tags: ["operations", "finance"]
    columns:
      - name: driver_id
        description: "Unique identifier for driver"
      - name: city_id
        description: "City where driver operates"
      - name: driver_status
        description: "Current status of driver (active, inactive)"
      - name: rating
        description: "Average driver rating"
      - name: vehicle_id
        description: "Primary vehicle assigned to driver"
      - name: onboarding_date
        description: "Date driver joined the platform"
      - name: driver_lifetime_trips
        description: "Total number of completed trips by driver"
      - name: gross_revenue
        description: "Total gross revenue generated by driver"
      - name: net_revenue
        description: "Total net revenue generated by driver"
      - name: first_trip_at
        description: "Timestamp of driver’s first trip"
      - name: last_trip_at
        description: "Timestamp of driver’s most recent trip"

  - name: dim_riders
    description: "Rider dimension table with attributes and lifetime metrics"
    config:
        meta:
            owner: marketing_team
            tags: ["operations", "finance"]
    columns:
      - name: rider_id
        description: "Unique identifier for rider"
      - name: signup_date
        description: "Date rider signed up"
      - name: country
        description: "Country of rider"
      - name: referral_code
        description: "Referral code used at signup"
      - name: rider_lifetime_value
        description: "Total fare value across completed trips"
      - name: rider_total_trips
        description: "Total number of completed trips by rider"
      - name: count_cities_visited
        description: "Number of distinct cities visited by rider"
      - name: last_ride_date
        description: "Timestamp of rider’s most recent trip"

  - name: dim_cities
    description: "City dimension table with attributes"
    config:
        meta:
            owner: analytics_team
            tags: ["operations"]
    columns:
      - name: city_id
        description: "Unique identifier for city"
      - name: city_name
        description: "Name of the city"
      - name: country
        description: "Country where the city is located"
      - name: region
        description: "Region or state of the city"
      - name: timezone
        description: "Timezone of the city"

