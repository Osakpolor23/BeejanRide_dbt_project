snapshots:
  - name: drivers_snapshot
    relation: ref('ephemeral_drivers')
    config:
      schema: snapshots
      database: beejanride-488809
      unique_key: driver_id
      strategy: timestamp
      updated_at: TIMESTAMP(updated_at)
      dbt_valid_to_current: "CAST('9999-12-31' AS TIMESTAMP)" # Specifies that current records should have `dbt_valid_to` set to `'9999-12-31'` instead of `NULL`.